name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment (.env.<environment>)'
        required: false
        default: 'qa'
        type: choice
        options: [ qa, stage, uat, prod ]
      project:
        description: 'Playwright project (browser) to run'
        required: false
        default: 'chromium'
        type: choice
        options: [ chromium, firefox, webkit, all ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: ${{ github.event.inputs.environment || 'qa' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Install Playwright Browsers
        run: npm run install:browsers
      - name: Run Playwright tests
        run: npm test -- ${{ github.event.inputs.project && github.event.inputs.project != 'all' && format('--project={0}', github.event.inputs.project) || '' }}
      - name: Generate Allure report
        if: ${{ !cancelled() }}
        run: npm run allure:generate
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: reports/
          retention-days: 30
